# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: motifini

before:
  hooks:
    - go mod tidy

builds:
  - id: motifini
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - freebsd
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X "golift.io/version.Version={{.Version}}"
      - -X "golift.io/version.BuildDate={{.Date}}"
      - -X "golift.io/version.BuildUser={{.Env.USER}}"
      - -X "golift.io/version.Revision={{.Env.REVISION}}"
      - -X "golift.io/version.Branch={{.ShortCommit}} [{{.Branch}}]"

universal_binaries:
  - id: motifini
    replace: true

# Sign + notarize the macOS universal binary (quill; works on Linux CI).
# Enabled only when MACOS_SIGN_P12 is set so local snapshots still work.
notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      ids:
        - motifini
      sign:
        certificate: "{{ .Env.MACOS_SIGN_P12 }}"
        password: "{{ .Env.MACOS_SIGN_PASSWORD }}"
      notarize:
        issuer_id: "{{ .Env.MACOS_NOTARY_ISSUER_ID }}"
        key_id: "{{ .Env.MACOS_NOTARY_KEY_ID }}"
        key: "{{ .Env.MACOS_NOTARY_KEY }}"
        wait: true
        timeout: 20m

archives:
  - id: motifini
    formats: [tar.gz]
    wrap_in_directory: true
    files:
      - LICENSE
      - README.md
      - examples/motifini.conf.example
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

homebrew_casks:
  - name: motifini
    ids:
      - motifini
    binaries:
      - motifini
    repository:
      owner: golift
      name: homebrew-mugs
      branch: master
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Brew cask update for {{ .ProjectName }} version {{ .Tag }}"
    directory: Casks
    homepage: https://github.com/davidnewhall/motifini
    description: SecuritySpy Telegram Bot — motion clips and camera alerts in Telegram
    license: MIT
    url:
      template: "https://github.com/davidnewhall/motifini/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    service: |
      run ["#{opt_bin}/motifini", "--config", "#{etc}/motifini.conf"]
      keep_alive true
      log_path "#{var}/log/motifini.log"
      error_log_path "#{var}/log/motifini.log"
    hooks:
      post:
        install: |
          FileUtils.cp "#{staged_path}/examples/motifini.conf.example", "#{etc}/motifini.conf.example"
          FileUtils.cp "#{staged_path}/examples/motifini.conf.example", "#{etc}/motifini.conf" unless File.exist?("#{etc}/motifini.conf")
    caveats: |
      Edit #{etc}/motifini.conf (example copied on install), then:
        brew services start motifini
      State/log paths in the example default to /opt/homebrew/var/... — adjust if brew --prefix differs.

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
