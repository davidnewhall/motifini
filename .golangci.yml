version: '2'
output:
  path-mode: abs
linters:
  default: all
  disable:
    - exhaustruct
    - depguard
    - wsl
    - wsl_v5
    - funcorder
    - exhaustive
    - nlreturn
    - gomodguard # deprecated
    # UI button labels / toast strings — constants hurt readability more than they help.
    - goconst
    # Wizard layouts use small literals (2-col rows, pause defaults, etc.).
    - mnd
    - testpackage
  settings:
    # Wizard/callback routers are large switches; 15 keeps real spaghetti out.
    cyclop:
      max-complexity: 15
    gocyclo:
      min-complexity: 30
    gocritic:
      enable-all: true
      # Conflicts with nonamedreturns; unnamed (string, string) pairs are fine.
      disabled-checks:
        - unnamedResult
    errcheck:
      check-type-assertions: true
      check-blank: false
      disable-default-exclusions: false
      exclude-functions:
        - (*os.File).Close
        - (io.Closer).Close
        - os.Remove

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
